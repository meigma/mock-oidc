site_name: mock-oidc
site_description: Standalone mock OIDC/OAuth2 authorization server for testing
site_url: https://meigma.github.io/mock-oidc/
repo_name: meigma/mock-oidc
repo_url: https://github.com/meigma/mock-oidc
edit_uri: edit/master/docs/docs/
docs_dir: docs
site_dir: build
strict: true

theme:
  name: material
  language: en
  features:
    - content.action.edit
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Tutorial:
      - Your first mock sign-in: tutorials/first-mock-sign-in.md
  - How-to guides:
      - Get tokens for every grant: how-to/get-tokens-for-every-grant.md
      - Drive the authorization-code flow: how-to/drive-the-authorization-code-flow.md
      - Shape token claims: how-to/shape-token-claims.md
      - Simulate expiry and time: how-to/simulate-expiry-and-time.md
      - Capture and assert requests: how-to/capture-and-assert-requests.md
      - Use multiple issuers: how-to/use-multiple-issuers.md
      - Serve over TLS: how-to/serve-over-tls.md
      - Run behind a proxy or in Docker: how-to/run-behind-a-proxy-or-in-docker.md
      - Lock down the control plane: how-to/lock-down-the-control-plane.md
      - Migrate from mock-oauth2-server: how-to/migrate-from-mock-oauth2-server.md
      - Verify released artifacts: how-to/verify-released-artifacts.md
  - Reference:
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
      - Tokens and claims: reference/tokens-and-claims.md
      - Control plane (/_mock): reference/control-plane.md
      - Observability: reference/observability.md
      - API Reference: api.md
  - Explanation:
      - The security model: explanation/security-model.md
      - Issuers and advertised identity: explanation/issuers-and-identity.md
      - Parity with mock-oauth2-server: explanation/parity.md
      - Architecture and distribution: explanation/architecture-and-distribution.md

plugins:
  - search
  # Renders docs/openapi.yaml into the API Reference page via the [OAD(...)] directive.
  - neoteroi.mkdocsoad:
      use_pymdownx: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/palette.css
  # Vendored from the neoteroi-mkdocs v1.2.0 release (css-v1.2.0.css); the wheel
  # does not ship it. Re-pull the matching asset when bumping neoteroi-mkdocs.
  - stylesheets/mkdocsoad.css
