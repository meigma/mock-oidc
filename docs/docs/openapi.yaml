                  code_challenge_methods_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  end_session_endpoint:
                    type: string
                  id_token_signing_alg_values_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  introspection_endpoint:
                    type: string
                  issuer:
                    type: string
                  jwks_uri:
                    type: string
                  response_modes_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  response_types_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  revocation_endpoint:
                    type: string
                  subject_types_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  token_endpoint:
                    type: string
                  userinfo_endpoint:
                    type: string
                required:
                  - issuer
                  - authorization_endpoint
                  - end_session_endpoint
                  - revocation_endpoint
                  - token_endpoint
                  - userinfo_endpoint
                  - jwks_uri
                  - introspection_endpoint
                  - response_types_supported
                  - response_modes_supported
