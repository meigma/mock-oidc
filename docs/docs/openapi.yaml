                audience:
                  type: string
                client_assertion:
                  type: string
                client_assertion_type:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
                code:
                  type: string
                code_verifier:
                  type: string
                grant_type:
                  type: string
                password:
                  type: string
                redirect_uri:
                  type: string
                refresh_token:
                  type: string
                scope:
                  type: string
                subject_token:
                  type: string
                subject_token_type:
                  type: string
                username:
                  type: string
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  access_token:
                    type: string
                  expires_in:
                    format: int64
                    type: integer
                  id_token:
                    type: string
                  issued_token_type:
                    type: string
                  refresh_token:
                    type: string
                  scope:
                    type: string
                  token_type:
                    type: string
                required:
                  - token_type
                  - access_token
                  - expires_in
                type: object
          description: Success
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: OAuth2 token endpoint
      tags:
        - OAuth2
  /{issuer}/userinfo:
