components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    JWKDTO:
      additionalProperties: false
      properties:
        alg:
          type: string
        crv:
          type: string
        e:
          type: string
        kid:
          type: string
        kty:
          type: string
        "n":
          type: string
        use:
          type: string
        x:
          type: string
        "y":
          type: string
      required:
        - kty
        - use
        - kid
        - alg
      type: object
  securitySchemes:
    oauth2:
      flows:
        clientCredentials:
          scopes: {}
          tokenUrl: /{issuer}/token
      type: oauth2
    openIdConnect:
      openIdConnectUrl: /{issuer}/.well-known/openid-configuration
      type: openIdConnect
info:
  title: mock-oidc
  version: dev
openapi: 3.0.3
paths:
  /favicon.ico:
    get:
      operationId: favicon
      responses:
        "200":
          content:
            application/json:
              schema:
                format: base64
                type: string
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
            Location:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Favicon (empty 200)
      tags:
        - OIDC
  /{issuer}/.well-known/oauth-authorization-server:
    get:
      operationId: discovery-oauth
      parameters:
        - description: Issuer id; the first path segment.
          in: path
          name: issuer
          required: true
          schema:
            description: Issuer id; the first path segment.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  authorization_endpoint:
                    type: string
                  code_challenge_methods_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  end_session_endpoint:
                    type: string
                  id_token_signing_alg_values_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  introspection_endpoint:
                    type: string
                  issuer:
                    type: string
                  jwks_uri:
                    type: string
                  response_modes_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  response_types_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  revocation_endpoint:
                    type: string
                  subject_types_supported:
                    items:
                      type: string
                    nullable: true
                    type: array
                  token_endpoint:
                    type: string
                  userinfo_endpoint:
                    type: string
                required:
                  - issuer
                  - authorization_endpoint
                  - end_session_endpoint
                  - revocation_endpoint
                  - token_endpoint
                  - userinfo_endpoint
                  - jwks_uri
                  - introspection_endpoint
                  - response_types_supported
                  - response_modes_supported
                  - subject_types_supported
                  - id_token_signing_alg_values_supported
                  - code_challenge_methods_supported
                type: object
          description: Success
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: OIDC/OAuth2 provider metadata
      tags:
        - OIDC
  /{issuer}/.well-known/openid-configuration:
