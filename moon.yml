language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'mock-oidc'
  description: 'Mock OIDC/OAuth2 server for testing.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

# Every task runs against `system` binaries that mise (mise.toml + mise.lock) puts
# on PATH; moon manages no language toolchain itself.
toolchains:
  default: 'system'

fileGroups:
  goSources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'go.mod'
    - 'go.sum'
    # Tool/version pins. Under the `system` toolchain moon does not hash the Go
    # binary's version, so the mise pins are inputs here too — bumping Go (or any
    # tool) in mise must invalidate the cacheable build/openapi tasks.
    - 'mise.toml'
    - 'mise.lock'
  # Inputs that drive mockery code generation: the config plus the source files
  # declaring the mocked interfaces (the outbound ports). No OIDC ports exist yet
  # in the skeleton, so only the config and tool pins are inputs for now.
  mockerySources:
    - '.mockery.yaml'
    - 'mise.toml'
    - 'mise.lock'
  lintConfig:
    - '.golangci.yml'
    - 'mise.toml'
    - 'mise.lock'
  releaseConfig:
    - '.goreleaser.yaml'
    - 'ghd.toml'
    - 'release-please-config.json'
    - '.release-please-manifest.json'
    - '.github/workflows/release*.yml'

workspace:
  inheritedTasks:
    include: []

tasks:
  format:
    command: 'golangci-lint fmt --config .golangci.yml --diff'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  lint:
    command: 'golangci-lint run --config .golangci.yml ./... --show-stats=false'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  build:
    command: 'go build -o bin/mock-oidc ./cmd/mock-oidc'
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/mock-oidc'

  test:
    command: 'go test ./...'
    inputs:
      - '@group(goSources)'
    options:
      cache: false

  # Regenerate the committed OpenAPI spec from the server code. Run after
  # changing the API; docs:build renders the committed result.
  openapi:
    command: 'go run ./cmd/mock-oidc openapi --output docs/docs/openapi.yaml'
    inputs:
      - '@group(goSources)'
    outputs:
      - 'docs/docs/openapi.yaml'

  # Drift-guard: regenerate to a temp file and fail if it differs from the
  # committed spec, so the spec can never fall out of sync with the code. Writes
  # no tracked file, so it never races docs:build reading the committed spec.
  openapi-check:
    script: 'tmp="$(mktemp)" && go run ./cmd/mock-oidc openapi --output "$tmp" && git diff --no-index --exit-code -- docs/docs/openapi.yaml "$tmp"'
    inputs:
      - '@group(goSources)'
      - 'docs/docs/openapi.yaml'
    options:
      cache: false

  # Regenerate the committed testify mocks from the outbound ports. Run after
  # changing a mocked interface, then commit the result. The OIDC hexagon has no
  # ports yet (`.mockery.yaml` `packages:` is empty `{}`), so this is a no-op in
  # the skeleton — mockery v3 fatals on an empty config, so the task short-circuits
  # until Slice 1 repoints it at `internal/oidc` ports.
  mockery:
    script: |
      set -eu
      if grep -qE '^packages:[[:space:]]*\{\}[[:space:]]*$' .mockery.yaml; then
        echo "mockery: no packages configured yet (skeleton); nothing to generate"
        exit 0
      fi
      mockery
    inputs:
      - '@group(mockerySources)'
    options:
      cache: false

  # Drift-guard: regenerate the mocks into a throwaway directory and fail if they
  # differ from the committed package, so the generated code can never fall out of
  # sync with the interfaces. With an empty `packages:` there are no committed
  # mocks to diff and mockery v3 fatals, so the task short-circuits green until
  # Slice 1 adds OIDC ports.
  mockery-check:
    script: |
      set -eu
      if grep -qE '^packages:[[:space:]]*\{\}[[:space:]]*$' .mockery.yaml; then
        echo "mockery-check: no packages configured yet (skeleton); nothing to diff"
        exit 0
      fi
      tmp="$(mktemp -d "${PWD}/.mockery-check.XXXXXX")"
      cfg="${tmp}.yaml"
      trap 'rm -rf "$tmp" "$cfg"' EXIT
      sed "s|dir: \"{{.InterfaceDir}}/mocks\"|dir: ${tmp#"${PWD}/"}|" .mockery.yaml > "$cfg"
      mockery --config "$cfg"
      # Compare every committed mocks package against the freshly generated files
      # of the same name.
      for dir in internal/oidc/mocks; do
        [ -d "$dir" ] || continue
        for committed in "$dir"/*.go; do
          git diff --no-index --exit-code -- "$committed" "$tmp/$(basename "$committed")"
        done
      done
    inputs:
      - '@group(mockerySources)'
      - 'internal/oidc/mocks/*.go'
    options:
      cache: false

  # Run the container-backed integration suite (gated by the `integration` build
  # tag, so the default `test`/`check` stay hermetic). Requires a running Docker
  # daemon; testcontainers boots the mock-oidc:dev image per run. It runs in CI
  # (`runInCI: true`) on the Docker-capable `ubuntu-latest` runner, but stays out
  # of the hermetic `check` aggregate so a local `check` needs no Docker.
  test-integration:
    command: 'go test -tags integration ./internal/integration/...'
    inputs:
      - '@group(goSources)'
    options:
      cache: false
      runInCI: true

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
      - 'root:openapi-check'
      - 'root:mockery-check'
      - 'docs:build'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true
