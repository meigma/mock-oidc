# Day-one local stack: the mock-oidc API server.
#
#   mise run stack-up
#   curl -sS localhost:8080/isalive   # infra liveness route
#
# The server is DB-less, so this is a single service. Build + load the locally
# built apko image with `mise run image-local` (or `mise run stack-up`, which
# builds the image and then runs `docker compose up`).

name: mock-oidc

services:
  api:
    image: mock-oidc:dev
    ports:
      - "8080:8080" # API
      - "9090:9090" # /metrics (dedicated listener)
    restart: unless-stopped
