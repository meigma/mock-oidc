<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authorization error — mock-oidc</title>
<style>
  :root { color-scheme: light dark; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
         background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
  main { width: 100%; max-width: 30rem; background: #1e293b; border: 1px solid #7f1d1d;
         border-radius: 12px; padding: 1.75rem; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
  h1 { margin: 0 0 1rem; font-size: 1.3rem; color: #f87171; }
  .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 1rem;
          color: #fca5a5; margin: 0 0 .5rem; }
  p { line-height: 1.5; margin: 0; }
</style>
</head>
<body>
<main>
  <h1>Authorization error</h1>
  <p class="code">{{.Error}}</p>
  {{- if .Description}}
  <p>{{.Description}}</p>
  {{- end}}
</main>
</body>
</html>
